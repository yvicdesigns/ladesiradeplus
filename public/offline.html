<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <title>La Desirade Plus - Hors Ligne</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 2rem;
      max-width: 400px;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .icon {
      width: 64px;
      height: 64px;
      color: #FF6B35;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #111827;
    }
    p {
      color: #4b5563;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .button {
      display: inline-block;
      background-color: #FF6B35;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #ea580c;
    }
    .cached-pages {
      margin-top: 1.5rem;
      text-align: left;
      border-top: 1px solid #e5e7eb;
      padding-top: 1.5rem;
    }
    .cached-pages h2 {
      font-size: 1rem;
      color: #374151;
      margin-bottom: 0.75rem;
    }
    .cached-pages ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .cached-pages li {
      margin-bottom: 0.5rem;
    }
    .cached-pages a {
      color: #FF6B35;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cached-pages a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
    </svg>
    <h1>Vous êtes hors ligne</h1>
    <p>Il semble que votre connexion Internet soit interrompue. Veuillez vérifier votre réseau.</p>
    
    <a href="/" class="button" onclick="window.location.reload(); return false;">Réessayer</a>
    
    <div class="cached-pages">
      <h2>Pages disponibles hors ligne :</h2>
      <ul>
        <li><a href="/">🏠 Accueil (Version en cache)</a></li>
        <li><a href="/menu">🍔 Menu (Dernière version)</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
